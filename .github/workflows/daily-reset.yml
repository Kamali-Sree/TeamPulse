name: TeamPulse Daily Reset

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-reset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Archive current day
        run: npm run archive-day

      - name: Generate trend analytics
        run: npm run generate-trends

      - name: Reset tasks for new day
        run: npm run reset-day

      - name: Commit daily archive and reset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: archive TeamPulse day and reset tasks"
          file_pattern: README.md data/tasks.json data/analytics.json data/trends.json data/history/*.json
