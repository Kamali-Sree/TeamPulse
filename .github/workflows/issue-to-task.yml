name: TeamPulse Issue to Task

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  import-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Import issue as TeamPulse task
        run: node scripts/issue_to_task.js

      - name: Regenerate analytics
        run: npm run generate-analytics

      - name: Regenerate README dashboard
        run: npm run update-readme

      - name: Commit task analytics update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: import GitHub issue as TeamPulse task"
          file_pattern: README.md data/tasks.json data/users.json data/analytics.json
