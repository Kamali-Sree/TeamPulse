name: TeamPulse Dashboard Refresh

on:
  push:
    paths:
      - "data/tasks.json"
      - "data/analytics.json"
      - "scripts/generate_analytics.js"
      - "scripts/update_readme.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate analytics
        run: npm run generate-analytics

      - name: Regenerate README dashboard
        run: npm run update-readme

      - name: Commit dashboard refresh
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh TeamPulse dashboard"
          file_pattern: README.md data/tasks.json data/analytics.json
